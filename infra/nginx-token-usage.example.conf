server {
    listen 80;
    listen [::]:80;
    server_name your-token-server.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-token-server.example.com;

    ssl_certificate /etc/letsencrypt/live/your-token-server.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-token-server.example.com/privkey.pem;

    # SSE essentials. Without these nginx buffers the response stream and the
    # client gets snapshots in a single chunk much later.
    proxy_buffering off;
    proxy_cache off;
    gzip off;
    chunked_transfer_encoding on;

    location / {
        proxy_pass http://127.0.0.1:18081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        # 6h SSE keep-open. nginx defaults to 60s which would drop the stream.
        proxy_read_timeout 21600s;
        proxy_send_timeout 21600s;
        add_header X-Accel-Buffering no;
    }
}
