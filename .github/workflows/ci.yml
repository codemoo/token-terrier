name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  swift:
    name: Swift app
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  go:
    name: Go server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server-go
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server-go/go.mod
          cache: false

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./cmd/daemon
